<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Hamed Ashouri</title>
  <meta name="robots" content="noindex">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;
      background:linear-gradient(160deg,#081D34,#12457A);color:#fff;text-align:center;padding:2rem;}
    .mark{width:60px;height:60px;border-radius:14px;background:rgba(255,255,255,.08);color:#C8A24A;
      display:grid;place-items:center;font-weight:800;font-size:1.3rem;margin:0 auto 1.5rem;}
    .logo{max-width:300px;width:70%;height:auto;aspect-ratio:487/140;object-fit:contain;margin:0 auto 1.5rem;display:block;background:transparent;padding:0;border-radius:0;}
    .logo.is-missing{display:none;}.logo.is-missing + .mark{display:grid;}.mark{display:none;}
    h1{font-size:2.5rem;margin-bottom:.5rem;}
    p{color:#A9BCB2;margin-bottom:2rem;}
    .links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
    a{display:inline-block;padding:.9rem 1.8rem;border-radius:10px;font-weight:700;text-decoration:none;background:#C8A24A;color:#081D34;}
    a.alt{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.5);}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/assets/img/logo.png" alt="Hamed Ashouri — Mortgage Broker & Financial Strategist" onerror="this.classList.add('is-missing')">
    <div class="mark" aria-hidden="true">HA</div>
    <h1>404</h1>
    <p>The page you're looking for couldn't be found.<br>صفحه‌ای که دنبال آن هستید پیدا نشد.</p>
    <div class="links">
      <a href="/en/">English Home</a>
      <a class="alt" href="/fa/" lang="fa">خانه فارسی</a>
    </div>
  </main>
</body>
</html>
