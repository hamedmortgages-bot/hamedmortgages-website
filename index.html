<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamed Ashouri — Mortgage Broker &amp; Financial Strategist | Ontario</title>
  <meta name="description" content="Strategic mortgage solutions in Ontario. Choose your language / زبان خود را انتخاب کنید.">
  <link rel="canonical" href="https://hamedmortgages.ca/">
  <link rel="alternate" hreflang="en" href="https://hamedmortgages.ca/en/">
  <link rel="alternate" hreflang="fa" href="https://hamedmortgages.ca/fa/">
  <link rel="alternate" hreflang="x-default" href="https://hamedmortgages.ca/">
  <!-- Auto-redirect by browser language; manual chooser shown as fallback / for crawlers -->
  <script>
    (function () {
      try {
        var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
        var target = lang.indexOf("fa") === 0 ? "fa/" : "en/";
        // Use replace so the splash page isn't kept in history
        window.location.replace(target);
      } catch (e) { /* fall through to manual chooser */ }
    })();
  </script>
  <style>
    :root{--green:#0F3D2E;--gold:#C5A249;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;
      background:linear-gradient(160deg,#0B2A20,#15523E);color:#fff;text-align:center;padding:2rem;}
    .mark{width:64px;height:64px;border-radius:14px;background:rgba(255,255,255,.08);color:var(--gold);
      display:grid;place-items:center;font-weight:800;font-size:1.4rem;margin:0 auto 1.5rem;}
    .logo{max-width:340px;width:70%;height:auto;background:#000;padding:14px 20px;border-radius:12px;margin:0 auto 1.75rem;display:block;}
    .logo.is-missing{display:none;}
    .logo.is-missing + .mark{display:grid;}
    .mark{display:none;}
    h1{font-size:1.5rem;margin-bottom:.5rem;}
    p{color:#A9BCB2;margin-bottom:2rem;}
    .choose{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
    a.btn{display:inline-block;padding:1rem 2.2rem;border-radius:10px;font-weight:700;text-decoration:none;
      background:var(--gold);color:#0B2A20;min-width:160px;}
    a.btn.alt{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.5);}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/img/logo.png" alt="Hamed Ashouri — Mortgage Broker & Financial Strategist" onerror="this.classList.add('is-missing')">
    <div class="mark" aria-hidden="true">HA</div>
    <h1>Hamed Ashouri — Mortgage Broker &amp; Strategist</h1>
    <p>Please choose your language · لطفاً زبان خود را انتخاب کنید</p>
    <div class="choose">
      <a class="btn" href="en/">English</a>
      <a class="btn alt" href="fa/" lang="fa">فارسی</a>
    </div>
  </main>
</body>
</html>
